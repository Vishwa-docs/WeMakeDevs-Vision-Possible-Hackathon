name: Deploy WorldLens Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        env:
          # Stream API key is safe to expose (public, read-only for joining calls)
          VITE_STREAM_API_KEY: ${{ secrets.VITE_STREAM_API_KEY }}
          # Users run their own backend locally
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL || 'http://localhost:8000' }}
          # Base path for GitHub Pages (set to /REPO_NAME/ in repo vars)
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
        run: npm run build

      - name: Add 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
